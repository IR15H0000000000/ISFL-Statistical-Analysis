services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: isfl
      POSTGRES_PASSWORD: isfl
      POSTGRES_DB: isfl
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isfl"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://isfl:isfl@db:5432/isfl
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
