<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISFL Team Statistics</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f5f5f5;
    color: #1a1a2e;
  }

  header {
    background: #1a1a2e;
    color: #fff;
    padding: 3rem 2rem 1.5rem;
    text-align: center;
  }

  header .label {
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 3px;
    color: #56d6d6;
    margin-bottom: 0.5rem;
  }

  header h1 {
    font-size: 2.5rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  nav {
    display: flex;
    justify-content: center;
    gap: 0;
    margin-top: 1.5rem;
  }

  nav button {
    padding: 0.6rem 2rem;
    border: 1px solid #3a3a5e;
    background: transparent;
    color: #8888aa;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  nav button:first-child { border-radius: 4px 0 0 4px; }
  nav button:last-child { border-radius: 0 4px 4px 0; }

  nav button.active {
    background: #56d6d6;
    color: #1a1a2e;
    border-color: #56d6d6;
  }

  nav button:hover:not(.active) {
    background: #2a2a4e;
    color: #ccc;
  }

  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1400px;
    margin: 1.5rem auto 0.75rem;
    padding: 0 1rem;
  }

  .controls select {
    padding: 0.5rem 1rem;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 0.9rem;
    background: #fff;
  }

  .controls .updated {
    font-size: 0.8rem;
    color: #888;
  }

  .table-wrap {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 1rem 3rem;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    font-size: 0.85rem;
  }

  thead th {
    background: #1a1a2e;
    color: #aab;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.7rem;
    letter-spacing: 0.5px;
    padding: 0.75rem 0.6rem;
    text-align: right;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    position: relative;
  }

  thead th:first-child,
  thead th:nth-child(2) {
    text-align: left;
  }

  thead th:hover { color: #56d6d6; }

  thead th .arrow {
    font-size: 0.6rem;
    margin-left: 3px;
    opacity: 0.4;
  }

  thead th.sort-active .arrow { opacity: 1; color: #56d6d6; }

  tbody td {
    padding: 0.6rem 0.6rem;
    text-align: right;
    border-bottom: 1px solid #f0f0f0;
    white-space: nowrap;
  }

  tbody td:first-child {
    text-align: center;
    color: #888;
    font-weight: 600;
    width: 40px;
  }

  tbody td:nth-child(2) {
    text-align: left;
    font-weight: 700;
    min-width: 60px;
  }

  tbody tr:hover { background: #f8f9ff; }

  tbody tr:last-child td { border-bottom: none; }

  .loading {
    text-align: center;
    padding: 3rem;
    color: #888;
    font-size: 1rem;
  }

  .epa-cell {
    font-weight: 600;
    border-radius: 3px;
    padding: 0.35rem 0.5rem;
  }

  footer {
    background: #1a1a2e;
    color: #666;
    text-align: center;
    padding: 2rem;
    font-size: 0.8rem;
  }

  footer a { color: #56d6d6; text-decoration: none; }

  #category-toggles {
    max-width: 1400px;
    margin: 0 auto 0.5rem;
    padding: 0 1rem;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  #category-toggles .cat-label {
    font-size: 11px;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  #category-toggles button {
    padding: 4px 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: #fff;
    color: #666;
    font-size: 11px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }

  #category-toggles button.active {
    background: #1a1a2e;
    color: #fff;
    border-color: #1a1a2e;
  }

  #category-toggles button:hover:not(.active) {
    background: #f0f0f0;
  }
</style>
</head>
<body>

<header>
  <div class="label">Teams</div>
  <h1>Statistics</h1>
  <div style="display:flex;justify-content:center;gap:1.5rem;margin-top:1rem;font-size:0.85rem">
    <a href="/static/teams.html" style="color:#56d6d6;text-decoration:none;text-transform:uppercase;letter-spacing:1px;font-weight:600">Teams</a>
    <a href="/static/leaderboard.html" style="color:#8888aa;text-decoration:none;text-transform:uppercase;letter-spacing:1px;font-weight:600">Players</a>
    <a href="/static/plays.html" style="color:#8888aa;text-decoration:none;text-transform:uppercase;letter-spacing:1px;font-weight:600">Plays</a>
    <a href="/static/visualizations.html" style="color:#8888aa;text-decoration:none;text-transform:uppercase;letter-spacing:1px;font-weight:600">Viz</a>
    <a href="/static/drives.html" style="color:#8888aa;text-decoration:none;text-transform:uppercase;letter-spacing:1px;font-weight:600">Drives</a>
  </div>
  <nav>
    <button id="btn-offensive" class="active" onclick="switchSide('offensive')">Offensive</button>
    <button id="btn-defensive" onclick="switchSide('defensive')">Defensive</button>
  </nav>
</header>

<div class="controls">
  <div style="display:flex;align-items:center;gap:1rem">
    <div>
      <label for="season-select">Season: </label>
      <select id="season-select" onchange="updatePlayoffButton(+this.value); loadData()"></select>
    </div>
    <div class="mode-toggle" style="display:inline-flex;gap:0">
      <button id="gt-regular" class="active" onclick="switchGameType('regular')" style="padding:0.4rem 1rem;border:1px solid #ccc;border-radius:4px 0 0 4px;background:#1a1a2e;color:#fff;font-size:0.8rem;cursor:pointer;font-weight:600">Regular Season</button>
      <button id="gt-playoff" onclick="switchGameType('playoff')" style="padding:0.4rem 1rem;border:1px solid #ccc;border-left:none;border-radius:0 4px 4px 0;background:#fff;color:#666;font-size:0.8rem;cursor:pointer;font-weight:600">Playoffs</button>
    </div>
  </div>
  <div class="updated" id="update-info"></div>
</div>

<div id="category-toggles">
  <span class="cat-label">Show:</span>
  <button id="cat-passing"  onclick="toggleCategory('passing')">Passing Stats</button>
  <button id="cat-rushing"  onclick="toggleCategory('rushing')">Rushing Stats</button>
  <button id="cat-turnover" onclick="toggleCategory('turnover')">Turnover Stats</button>
</div>

<div class="table-wrap">
  <div class="loading" id="loading">Loading...</div>
  <table id="stats-table" style="display:none">
    <thead>
      <tr id="header-row"></tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<footer>
  <p>ISFL EPA &mdash; <a href="/static/leaderboard.html">Player Leaderboard</a> | <a href="/docs">API Docs</a></p>
</footer>

<script>
const OFFENSIVE_COLUMNS = [
  { key: "rank",        label: "#",           fmt: "int",  align: "center", epa: false },
  { key: "team",        label: "Team",        fmt: "str",  align: "left",   epa: false },
  { key: "record",      label: "Record",      fmt: "str",  align: "center", epa: false },
  { key: "points_for",  label: "PF",          fmt: "int",  align: "right",  epa: false },
  { key: "total_epa",   label: "Off EPA",     fmt: "dec2", align: "right",  epa: true, ranked: true },
  { key: "success_pct", label: "Success %",   fmt: "pct1", align: "right",  epa: false },
  { key: "net_epa_plus",label: "Net EPA+",    fmt: "dec1", align: "right",  epa: true, ranked: true, zeroCentered: true },
  { key: "off_epa_plus",label: "EPA+",        fmt: "dec1", align: "right",  epa: true, ranked: true, zeroCentered: true },
  { key: "epa_per_play",label: "EPA/Play",    fmt: "dec3", align: "right",  epa: true, ranked: true },
  { key: "epa_per_pass",label: "EPA/Pass",    fmt: "dec3", align: "right",  epa: true,  category: "passing" },
  { key: "pass_yards",  label: "Pass YDS",  fmt: "int",  align: "right",  epa: false, category: "passing" },
  { key: "pass_td",     label: "Pass TD",     fmt: "int",  align: "right",  epa: false, category: "passing" },
  { key: "comp_pct",    label: "Comp %",      fmt: "pct1", align: "right",  epa: false, category: "passing" },
  { key: "sack_pct",    label: "Sack %",      fmt: "pct1", align: "right",  epa: false, category: "passing" },
  { key: "int_pct",     label: "Int %",       fmt: "pct1", align: "right",  epa: false, category: "passing" },
  { key: "epa_per_rush",label: "EPA/Rush",    fmt: "dec3", align: "right",  epa: true,  category: "rushing" },
  { key: "rush_yards",  label: "Rush YDS",  fmt: "int",  align: "right",  epa: false, category: "rushing" },
  { key: "rush_td",     label: "Rush TD",     fmt: "int",  align: "right",  epa: false, category: "rushing" },
  { key: "fumbles_total",   label: "FUM", fmt: "int",  align: "right", epa: false, category: "turnover" },
  { key: "fumbles_lost",    label: "FL",  fmt: "int",  align: "right", epa: false, category: "turnover" },
  { key: "fumble_lost_pct", label: "FL%", fmt: "pct1", align: "right", epa: false, category: "turnover" },
];

const DEFENSIVE_COLUMNS = [
  { key: "rank",           label: "#",           fmt: "int",  align: "center", epa: false },
  { key: "team",           label: "Team",        fmt: "str",  align: "left",   epa: false },
  { key: "record",         label: "Record",      fmt: "str",  align: "center", epa: false },
  { key: "points_against", label: "PA",          fmt: "int",  align: "right",  epa: false },
  { key: "total_epa",      label: "Def EPA",     fmt: "dec2", align: "right",  epa: true, ranked: true },
  { key: "success_pct",    label: "Success %",   fmt: "pct1", align: "right",  epa: false },
  { key: "def_epa_plus",   label: "EPA+",        fmt: "dec1", align: "right",  epa: true, ranked: true, zeroCentered: true },
  { key: "epa_per_play",   label: "EPA/Play",    fmt: "dec3", align: "right",  epa: true, ranked: true },
  { key: "epa_per_pass",   label: "EPA/Pass",    fmt: "dec3", align: "right",  epa: true,  category: "passing" },
  { key: "pass_yards",     label: "Pass YDS",  fmt: "int",  align: "right",  epa: false, category: "passing" },
  { key: "pass_td",        label: "Pass TD",     fmt: "int",  align: "right",  epa: false, category: "passing" },
  { key: "comp_pct",       label: "Comp %",      fmt: "pct1", align: "right",  epa: false, category: "passing" },
  { key: "sack_pct",       label: "Sack %",      fmt: "pct1", align: "right",  epa: false, category: "passing" },
  { key: "int_pct",        label: "Int %",       fmt: "pct1", align: "right",  epa: false, category: "passing" },
  { key: "epa_per_rush",   label: "EPA/Rush",    fmt: "dec3", align: "right",  epa: true,  category: "rushing" },
  { key: "rush_yards",     label: "Rush YDS",  fmt: "int",  align: "right",  epa: false, category: "rushing" },
  { key: "rush_td",        label: "Rush TD",     fmt: "int",  align: "right",  epa: false, category: "rushing" },
  { key: "forced_fumbles",        label: "FF",  fmt: "int",  align: "right", epa: false, category: "turnover" },
  { key: "def_fumble_recoveries", label: "FR",  fmt: "int",  align: "right", epa: false, category: "turnover" },
  { key: "fumble_recovery_pct",   label: "FR%", fmt: "pct1", align: "right", epa: false, category: "turnover" },
];

let currentData = [];
let currentSide = "offensive";
let currentGameType = "regular";
let playoffSeasons = new Set();
let sortKey = "epa_per_play";
let sortAsc = false;
let currentController = null;
let visibleCategories = new Set();

function getColumns() {
  const cols = currentSide === "defensive" ? DEFENSIVE_COLUMNS : OFFENSIVE_COLUMNS;
  return cols.filter(col => !col.category || visibleCategories.has(col.category));
}

function toggleCategory(id) {
  if (visibleCategories.has(id)) visibleCategories.delete(id);
  else visibleCategories.add(id);
  document.getElementById(`cat-${id}`).classList.toggle("active", visibleCategories.has(id));
  renderTable();
}

function formatVal(val, fmt) {
  if (val == null || val === undefined) return "-";
  switch (fmt) {
    case "str":  return val;
    case "int":  return Number(val).toLocaleString();
    case "dec2": return Number(val).toFixed(2);
    case "dec3": return Number(val).toFixed(3);
    case "pct1": return Number(val).toFixed(1) + "%";
    default:     return String(val);
  }
}

function epaColor(val, minVal, maxVal, mid, invert) {
  if (val == null) return "";
  const diff = val - mid;
  if (diff === 0) return "";
  const halfRange = (maxVal - minVal) / 2 || 1;
  const intensity = Math.min(Math.abs(diff) / halfRange, 1);
  const l = 95 - intensity * 35;
  const s = 40 + intensity * 30;
  const isGood = invert ? diff < 0 : diff > 0;
  return isGood ? `hsl(145, ${s}%, ${l}%)` : `hsl(0, ${s}%, ${l}%)`;
}

function rankedColor(val, minVal, maxVal, mid, invert) {
  if (val == null) return "";
  const diff = val - mid;
  if (diff === 0) return "";
  const halfRange = (maxVal - minVal) / 2 || 1;
  const intensity = Math.min(Math.abs(diff) / halfRange, 1);
  const isGood = invert ? diff < 0 : diff > 0;
  const l = 95 - intensity * 35;
  const s = 40 + intensity * 30;
  return isGood ? `hsl(145, ${s}%, ${l}%)` : `hsl(0, ${s}%, ${l}%)`;
}

function buildHeaders() {
  const row = document.getElementById("header-row");
  row.innerHTML = "";
  getColumns().forEach(col => {
    const th = document.createElement("th");
    th.dataset.key = col.key;
    th.style.textAlign = col.align;
    const isActive = col.key === sortKey;
    if (isActive) th.classList.add("sort-active");
    const arrow = isActive ? (sortAsc ? " \u25B2" : " \u25BC") : " \u25BC";
    th.innerHTML = (col.key === "rank" || col.key === "team") ? col.label : col.label + `<span class="arrow">${arrow}</span>`;
    if (col.key !== "rank") {
      th.onclick = () => {
        if (sortKey === col.key) {
          sortAsc = !sortAsc;
        } else {
          sortKey = col.key;
          // Default sort direction: descending for most, ascending for defensive EPA columns
          sortAsc = false;
        }
        renderTable();
      };
    }
    row.appendChild(th);
  });
}

function renderTable() {
  if (currentData.length === 0) {
    document.getElementById("stats-table").style.display = "none";
    document.getElementById("loading").style.display = "";
    document.getElementById("loading").textContent = "No data available for this selection.";
    return;
  }

  // Sort data
  const data = [...currentData];
  data.sort((a, b) => {
    let va = a[sortKey], vb = b[sortKey];
    // Sort record by wins numerically
    if (sortKey === "record") { va = a.wins ?? 0; vb = b.wins ?? 0; }
    if (va == null) va = sortAsc ? Infinity : -Infinity;
    if (vb == null) vb = sortAsc ? Infinity : -Infinity;
    if (typeof va === "string") {
      return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    }
    return sortAsc ? va - vb : vb - va;
  });

  // Re-rank
  data.forEach((d, i) => d.rank = i + 1);

  // Compute min/max/midpoint for EPA columns
  const cols = getColumns();
  const epaRanges = {};
  cols.filter(c => c.epa).forEach(col => {
    const vals = data.map(d => d[col.key]).filter(v => v != null);
    const min = Math.min(...vals);
    const max = Math.max(...vals);
    const mean = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : (min + max) / 2;
    const midpoint = col.zeroCentered ? 0 : mean;
    epaRanges[col.key] = { min, max, midpoint };
  });

  // Build headers with sort indicator
  buildHeaders();

  // Build rows
  const tbody = document.getElementById("table-body");
  tbody.innerHTML = "";
  data.forEach(row => {
    const tr = document.createElement("tr");
    cols.forEach(col => {
      const td = document.createElement("td");
      td.style.textAlign = col.align;
      td.textContent = formatVal(row[col.key], col.fmt);
      if (col.epa) {
        td.classList.add("epa-cell");
        const range = epaRanges[col.key];
        let bg;
        if (col.ranked) {
          const invert = currentSide === "defensive";
          bg = rankedColor(row[col.key], range.min, range.max, range.midpoint, invert);
        } else {
          const invert = currentSide === "defensive";
          bg = epaColor(row[col.key], range.min, range.max, range.midpoint, invert);
        }
        if (bg) td.style.backgroundColor = bg;
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });

  document.getElementById("stats-table").style.display = "";
  document.getElementById("loading").style.display = "none";
}

function switchSide(side) {
  currentSide = side;
  document.getElementById("btn-offensive").classList.toggle("active", side === "offensive");
  document.getElementById("btn-defensive").classList.toggle("active", side === "defensive");
  sortKey = "epa_per_play";
  sortAsc = side === "defensive";
  loadData();
}

function switchGameType(gt) {
  currentGameType = gt;
  const regBtn = document.getElementById("gt-regular");
  const playBtn = document.getElementById("gt-playoff");
  regBtn.style.background = gt === "regular" ? "#1a1a2e" : "#fff";
  regBtn.style.color = gt === "regular" ? "#fff" : "#666";
  playBtn.style.background = gt === "playoff" ? "#1a1a2e" : "#fff";
  playBtn.style.color = gt === "playoff" ? "#fff" : "#666";
  loadData();
}

function updatePlayoffButton(season) {
  const hasPlayoffs = playoffSeasons.has(season);
  const playBtn = document.getElementById("gt-playoff");
  playBtn.style.display = hasPlayoffs ? "" : "none";
  if (!hasPlayoffs && currentGameType === "playoff") {
    currentGameType = "regular";
    const regBtn = document.getElementById("gt-regular");
    regBtn.style.background = "#1a1a2e";
    regBtn.style.color = "#fff";
    playBtn.style.background = "#fff";
    playBtn.style.color = "#666";
  }
}

async function loadData() {
  const season = document.getElementById("season-select").value;
  if (!season) return;

  if (currentController) currentController.abort();
  currentController = new AbortController();

  document.getElementById("loading").textContent = "Loading...";
  document.getElementById("loading").style.display = "";
  document.getElementById("stats-table").style.display = "none";

  try {
    const resp = await fetch(`/epa/team-dashboard?season=${season}&side=${currentSide}&game_type=${currentGameType}`, { signal: currentController.signal });
    if (!resp.ok) throw new Error(`Server error (${resp.status})`);
    currentData = await resp.json();
    renderTable();
  } catch (e) {
    if (e.name === "AbortError") return;
    document.getElementById("loading").textContent = "Error loading data: " + e.message;
  }
}

async function init() {
  try {
    const [resp, playoffResp] = await Promise.all([
      fetch("/epa/seasons"),
      fetch("/epa/seasons?game_type=playoff"),
    ]);
    const seasons = await resp.json();
    playoffSeasons = new Set(await playoffResp.json());
    const sel = document.getElementById("season-select");
    seasons.forEach(s => {
      const opt = document.createElement("option");
      opt.value = s;
      opt.textContent = `Season ${s}`;
      sel.appendChild(opt);
    });
    if (seasons.length > 0) {
      sel.value = seasons[0];
      updatePlayoffButton(seasons[0]);
      loadData();
    } else {
      document.getElementById("loading").textContent = "No EPA data available. Run compute-epa first.";
    }
  } catch (e) {
    document.getElementById("loading").textContent = "Error connecting to API: " + e.message;
  }
}

init();
</script>
</body>
</html>
